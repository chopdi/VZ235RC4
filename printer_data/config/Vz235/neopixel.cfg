#------------------------------------------------- Neopixel -------------------------------------------------
[neopixel neo]
pin:PF12
chain_count:20
color_order:GRBW
initial_RED:0
initial_GREEN:0
initial_BLUE:1
initial_WHITE:0
[neopixel neo2]
pin:PF11
chain_count:5
color_order:GRB
initial_RED:0
initial_GREEN:0
initial_BLUE:1

[gcode_macro M106]
rename_existing: G106
gcode:
	{% if params.P is defined %}
		{% if params.P|int == 2 %}
			{% if params.S is defined %}
				{% if params.S|int == 255 %}
					{% set realspeed = 1 %}
				{% else %}
					{% if params.S|int == 0 %}
						{% set realspeed = 0 %}
					{% else %}
						{% set realspeed = params.S|float/255 %}
					{% endif %}
				{% endif %}
			{% else %}
				{% set realspeed = 1 %}
			{% endif %}

			SET_FAN_SPEED FAN=RSCS SPEED={realspeed}
		{% elif params.P|int == 3 %}
			{% if params.S is defined %}
				{% if params.S|int == 255 %}
					{% set realspeed = 1 %}
				{% else %}
					{% if params.S|int == 0 %}
						{% set realspeed = 0 %}
					{% else %}
						{% set realspeed = params.S|float/255 %}
					{% endif %}
				{% endif %}
			{% else %}
				{% set realspeed = 1 %}
			{% endif %}

			SET_FAN_SPEED FAN=Exhaust_fan SPEED={realspeed}
		{% endif %}
	{% else %}
		{% if params.S is defined %}
		  G106 S{params.S}
		{% else %}
		  G106 S255
		{% endif %}
	{% endif %}