#------------------------------------------------- Beacon -------------------------------------------------
[beacon]
serial:/dev/serial/by-id/usb-Beacon_Beacon_RevH_40708F584E5737374D202020FF113208-if00 
y_offset: 27.065
#   Y offset of beacon from the nozzle.
contact_max_hotend_temperature: 305 # increase to enable hot contacting
# Temperature limit for the hotend when contacting, override this for temps which may damage some surfaces.
backlash_comp: 0.04365
#------------------------------------------------- Bed Mesh -------------------------------------------------
[bed_mesh]
speed: 600
horizontal_move_z: 2
mesh_min: 30,28
mesh_max: 205,165
algorithm: bicubic
#fade_start: 1
#fade_end: 10
#split_delta_z: .025
#move_check_distance: 5
probe_count: 30,30
mesh_pps: 0,0
bicubic_tension: 0.1
#zero_reference_position: #117.5 , 117.5
contact_mesh_min: 20,20
contact_mesh_max: 200,165
#------------------------------------------------- Heater Bed -------------------------------------------------
[heater_bed]
#control: pid
heater_pin: PF5
sensor_type: Generic 3950
sensor_pin: PC4
min_temp: 0 
max_temp: 120
pwm_cycle_time: 0.02 # 50hz for european AC, to avoid flickering lights.
#------------------------------------------------- Chamber Heater -------------------------------------------------
[temperature_sensor chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
pullup_resistor: 4700
sensor_pin: PB0
min_temp: 0
max_temp: 80
#gcode_id: C: C
[heater_generic chamber_heater]
gcode_id: chamber_heater
heater_pin: PF8
smooth_time: 10
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA7
control: pid
pid_kp: 24.750
pid_ki: 2.578
pid_kd: 59.400
pwm_cycle_time: 0.25
min_temp: 0
max_temp: 100
max_power: 1.0
[heater_fan chamber_heater_fan]
pin: PA5
max_power: 1.0
kick_start_time: 0.5
heater: chamber_heater
heater_temp: 30.0
[verify_heater chamber_heater]
max_error: 100
check_gain_time: 100
hysteresis: 5
heating_gain: 2
#------------------------------------------------- EXTRUDER -------------------------------------------------
# The extruder motor used for pushing filament through the toolhead
#------------------------------------------------------------------------------------------------------------
[extruder]
step_pin: PG15
dir_pin: !PB6
enable_pin: !PG14
microsteps: 64
rotation_distance: 35.8   
pressure_advance: 0.03   
full_steps_per_rotation: 200
max_extrude_only_distance: 200
nozzle_diameter: 0.5
filament_diameter : 1.750
sensor_type:MAX31865
sensor_pin: PC9
spi_bus: spi3a
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2
min_temp: 0 
max_temp: 350
heater_pin:e_heater_pin
min_extrude_temp: 170
min_temp: 0
max_temp: 350
pressure_advance: 0.03
max_extrude_only_velocity: 60
gear_ratio: 60:10

[tmc5160 extruder]
cs_pin: PA10
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: False
#------------------------------------------------- Fans -------------------------------------------------
# Hotend cooling fan
[heater_fan toolhead_cooling_fan]
heater: extruder
# 4-pin fan connected to 2-pin header on Kraken - digital pwm
pin: PA0
cycle_time:  0.00004
shutdown_speed: 1

# Part cooling fan
[fan]
# 4-pin fan connected to 2-pin header on Kraken - digital pwm
pin: rpi:gpio26
max_power: 1
cycle_time: 0.002
hardware_pwm: false
shutdown_speed: 0
[fan_generic RSCS]
pin: PA4
max_power: 1
shutdown_speed: 0
kick_start_time: 0.1
off_below: 0.10
[fan_generic Exhaust_fan]
#  Nevermore - In E1 OUT Position
pin: PA3
max_power: 1.0
kick_start_time: 0.5

[gcode_macro HOME_Z]
gcode:
    NOZZLE_CLEAN
	# config
	{% set x_homed = 'x' in printer.toolhead.homed_axes %}
	{% set y_homed = 'y' in printer.toolhead.homed_axes %}
	{% set z_probe = printer["gcode_macro RatOS"].z_probe %}

	# beacon contact config
	{% set beacon_contact_z_homing = true if printer["gcode_macro RatOS"].beacon_contact_z_homing|default(false)|lower == 'true' else false %}

	# parameter
	{% set X = true if params.X|lower == 'true' else false %}
	{% set Y = true if params.Y|lower == 'true' else false %}
	{% set Z = true if params.Z|lower == 'true' else false %}

	DEBUG_ECHO PREFIX="HOME_Z" MSG="x_homed: {x_homed}, y_homed: {y_homed}, z_probe: {z_probe}, beacon_contact_z_homing: {beacon_contact_z_homing}"

	# home z
	{% if Z or not Y and not X %}
		RATOS_ECHO MSG="Homing Z"
		{% if x_homed == False or y_homed == False %}
			{ action_emergency_stop("X and Y must be homed before homing Z") }
		{% else %}
			{% if z_probe == "stowable" %}
				DEPLOY_PROBE
				_MOVE_TO_SAFE_Z_HOME
				{% if printer.configfile.settings.beacon is defined and beacon_contact_z_homing %}
					BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1
					_MOVE_TO_SAFE_Z_HOME Z_HOP=True
				{% else %}
					G28 Z
				{% endif %}
				_Z_HOP
				STOW_PROBE
			{% else %}
				_MOVE_TO_SAFE_Z_HOME
				{% if printer.configfile.settings.beacon is defined and beacon_contact_z_homing %}
					BEACON_AUTO_CALIBRATE SKIP_MODEL_CREATION=1
					_MOVE_TO_SAFE_Z_HOME Z_HOP=True
				{% else %}
					G28 Z
				{% endif %}
				_Z_HOP
			{% endif %}
		{% endif %}
	{% endif %}

#------------------------------------------------- Input Shaper -------------------------------------------------
[input_shaper]
shaper_freq_x: 90.6
shaper_type_x: 2hump_ei
shaper_freq_y: 70.4
shaper_type_y: zv
damping_ratio_x: 0.058000
damping_ratio_y: 0.095000

[gcode_macro M107]
rename_existing: G107
gcode:
	{% if params.P is defined %}
	  {% if params.P|int == 2 %}
		SET_FAN_SPEED FAN=RSCS SPEED=0
	  {% elif params.P|int == 3 %}
		SET_FAN_SPEED FAN=Exhaust_fan SPEED=0
	  {% endif %}      
	{% else %}
	  SET_FAN_SPEED FAN=RSCS SPEED=0  
	  SET_FAN_SPEED FAN=Exhaust_fan SPEED=0  
	  G107
	{% endif %}


[gcode_macro NOZZLE_CLEAN]
gcode:
   SAVE_GCODE_STATE NAME=nozzle_clean_state
   M118 Start Wiping macro
   {% if printer.toolhead.position.z|int < 10 %}  
         G90           
         G0 Z20 F6000     
   {% endif %}
   M118 Deploy Servo
   SET_SERVO SERVO=servo_wiper ANGLE=25
   G90
   G1 X117.5 Y166.25 F10000
   M118 Start Wiping
   G1 x15 Y166.25 F12000
   G1 x45 Y168.25 F12000
   G1 x15 Y166.25 F12000
   G1 x45 Y164.25 F12000
   G1 x15 Y166.25 F12000
   G1 x45 Y168.25 F12000
   G1 x15 Y166.25 F12000
   G1 x45 Y164.25 F12000
   G1 x15 Y166.25 F12000
   G1 x45 Y168.25 F12000
   G1 x15 Y166.25 F12000
   G1 x45 Y164.25 F12000
   G1 x15 Y166.25 F12000
   M118 Wiping Done
   G90
   G1 X117.5 Y117.5 F12000
   G1 Y117.5 F12000
   M118 Retract Wiper
   SET_SERVO SERVO=servo_wiper ANGLE=120
   M118 Wiping finished
   G92 E0
   RESTORE_GCODE_STATE NAME=nozzle_clean_state

[delayed_gcode wiper]
initial_duration: 1
gcode:
   SET_SERVO SERVO=servo_wiper ANGLE=120


[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True



